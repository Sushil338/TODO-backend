spring.application.name=TODO

spring.datasource.url=jdbc:mysql://todo-mysql:3306/taskdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

groq.api.key=${GROQ_KEY_TODO}
groq.api.url=https://api.groq.com/openai/v1

spring.ai.openai.base-url=${groq.api.url}
spring.ai.openai.api-key=${groq.api.key}
spring.ai.openai.chat.options.model=llama3-8b-8192

jwt.secret=${JWT_SECRETtodo}

# Redis Configuration (For local development)
spring.data.redis.host=todo-redis
spring.data.redis.port=6379

# Resend Mail Configuration
resend.api.key=${RESEND_API_KEYtodo}